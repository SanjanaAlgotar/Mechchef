<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in | Mechchef</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
  <main class="auth-shell">
    <a class="brand" href="index.html">Mechchef</a>
    <section class="auth-panel">
      <div class="tabs" role="tablist">
        <button class="tab active" data-auth-tab="login">Sign in</button>
        <button class="tab" data-auth-tab="register">Create account</button>
      </div>
      <form class="auth-form" id="loginForm">
        <h1>Welcome back</h1>
        <label>Email<input type="email" required placeholder="you@example.com"></label>
        <label>Password<input type="password" required placeholder="••••••••"></label>
        <button class="button" type="submit">Sign in</button>
        <p class="muted">Demo login accepts any email and password.</p>
      </form>
      <form class="auth-form hidden" id="registerForm">
        <h1>Create your account</h1>
        <label>Name<input type="text" required placeholder="Your name"></label>
        <label>Email<input type="email" required placeholder="you@example.com"></label>
        <label>Account type
          <select required>
            <option>Customer</option>
            <option>Cook</option>
          </select>
        </label>
        <button class="button" type="submit">Create account</button>
      </form>
    </section>
  </main>
  <script src="js/auth.js"></script>
</body>
</html>
